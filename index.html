<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Food Spinner</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;display:flex;flex-direction:column;min-height:100vh;align-items:center}
header{background:#fff;color:#000;width:100%;text-align:center;padding:15px;font-size:2rem;font-weight:bold}
.container{flex:1;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:20px}
.pointer{width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:40px solid #fff;z-index:5;margin-bottom:-10px}
#wheelWrap{position:relative}
#wheel{border-radius:50%;box-shadow:0 0 30px rgba(255,255,255,.25);background:#111}
#spinBtn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:110px;height:110px;border-radius:50%;border:none;background:#fff;color:#000;font-weight:bold;font-size:1.2rem;cursor:pointer;z-index:4}
#spinBtn:disabled{opacity:.5}
footer{padding:15px}
#popup{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center}
.card{background:#111;padding:20px;border-radius:16px;text-align:center;border:1px solid #444}
.card button,.card a{display:inline-block;margin-top:10px;padding:10px 16px;border-radius:8px;text-decoration:none;border:none}
.card a{background:#fff;color:#000}
</style>
</head>
<body>
<header>Fast Food Spinner</header>
<div class="container">
<div class="pointer"></div>
<div id="wheelWrap">
<canvas id="wheel" width="500" height="500"></canvas>
<button id="spinBtn">START</button>
</div>
</div>
<footer>Tapfone © 2026</footer>

<div id="popup">
<div class="card">
<h2 id="winner"></h2>
<a id="orderLink" target="_blank">Order Now</a><br>
<button onclick="popup.style.display='none'">Close</button>
</div>
</div>

<script>
const restaurants=[
{name:"Subway",color:"#0B8F3A",url:"https://www.subway.com"},
{name:"Pizza Hut",color:"#D71920",url:"https://www.pizzahut.ca"},
{name:"Mucho Burrito",color:"#F58220",url:"https://muchoburrito.com"},
{name:"Popeyes",color:"#F26B21",url:"https://www.popeyeschicken.ca"},
{name:"A&W",color:"#A65A2A",url:"https://web.aw.ca"},
{name:"Tim Hortons",color:"#B5121B",url:"https://www.timhortons.ca"},
{name:"McDonald's",color:"#FFC300",url:"https://www.mcdonalds.com/ca"},
{name:"Burger King",color:"#F05A28",url:"https://www.burgerking.ca"},
{name:"Taco Bell",color:"#702F8A",url:"https://www.tacobell.ca"},
{name:"Wendy's",color:"#D22630",url:"https://www.wendys.com/en-ca"},
{name:"Domino's",color:"#006491",url:"https://www.dominos.ca"},
{name:"KFC",color:"#C8102E",url:"https://www.kfc.ca"}
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const spinBtn=document.getElementById("spinBtn");
const popup=document.getElementById("popup");
let angle=0, spinning=false;

function drawWheel(){
const arc=(Math.PI*2)/restaurants.length;
ctx.clearRect(0,0,500,500);
restaurants.forEach((r,i)=>{
ctx.beginPath();
ctx.moveTo(250,250);
ctx.arc(250,250,240,i*arc,(i+1)*arc);
ctx.fillStyle=r.color;
ctx.fill();
ctx.save();
ctx.translate(250,250);
ctx.rotate(i*arc+arc/2);
ctx.fillStyle="#fff";
ctx.font="bold 16px Arial";
ctx.textAlign="right";
ctx.fillText(r.name,220,6);
ctx.restore();
});
ctx.beginPath();
ctx.arc(250,250,70,0,Math.PI*2);
ctx.fillStyle="#111";
ctx.fill();
}
drawWheel();

function beep(freq,dur){
const a=new(window.AudioContext||window.webkitAudioContext)();
const o=a.createOscillator();
const g=a.createGain();
o.connect(g);g.connect(a.destination);
o.frequency.value=freq;o.start();
g.gain.setValueAtTime(.1,a.currentTime);
g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+dur/1000);
o.stop(a.currentTime+dur/1000);
}

spinBtn.onclick=()=>{
if(spinning)return;
spinning=true;
spinBtn.disabled=true;
beep(400,100);
const extra=3600+Math.random()*3600;
angle+=extra;
canvas.style.transition="transform 6s cubic-bezier(.17,.67,.12,.99)";
canvas.style.transform=`rotate(${angle}deg)`;

setTimeout(()=>{
const seg=360/restaurants.length;
const normalized=(360-(angle%360)+90)%360;
const index=Math.floor(normalized/seg)%restaurants.length;
const winner=restaurants[index];
document.getElementById("winner").textContent="Winner: "+winner.name;
document.getElementById("orderLink").href=winner.url;
popup.style.display="flex";
beep(800,300);
spinning=false;
spinBtn.disabled=false;
},6000);
};
</script>
</body>
</html>
