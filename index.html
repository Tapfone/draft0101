 <body data-template-id="__page-root" class="min-h-screen flex flex-col items-center justify-between p-6">
  <header class="w-full text-center pt-4">
   <h1 data-template-id="app-title" class="canva-text font-bold"></h1>
  </header>
  <main class="flex flex-col items-center gap-8 w-full max-w-sm">
   <div class="time-display text-6xl font-bold tracking-tight text-center text-white" id="display">
    00:00.00
   </div>
   <div class="grid grid-cols-2 gap-3 w-full">
    <button data-template-id="start-btn" class="canva-button py-3 rounded-xl font-semibold text-lg" id="start-btn" onclick="startTimer()"></button> <button data-template-id="stop-btn" class="canva-button py-3 rounded-xl font-semibold text-lg" id="stop-btn" onclick="stopTimer()"></button> <button data-template-id="reset-btn" class="canva-button py-3 rounded-xl font-semibold text-lg" id="reset-btn" onclick="resetTimer()"></button> <button data-template-id="lap-btn" class="canva-button py-3 rounded-xl font-semibold text-lg" id="lap-btn" onclick="recordLap()"></button>
   </div>
   <div id="lap-list" class="w-full space-y-2 max-h-48 overflow-y-auto bg-white rounded-lg p-4"></div>
  </main>
  <footer class="w-full text-center pb-4">
   <p data-template-id="footer-text" class="canva-text text-sm"></p>
  </footer>
  <script src="/_sdk/0e8f359d3c23f6d5.editing_sdk.js" integrity="sha512-CBLuYm/olmgyMedTtPRFeqCRZcSWUh6/39ewyXAbnr1dsVHBACzZ59KGJZXvuWNHOHixfWegfuMN9JzmLEDIoA=="></script>
  <script>
        let elapsed = 0, interval = null, lapCount = 0;

        function formatTime(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            const cs = Math.floor((ms % 1000) / 10);
            return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
        }

        function startTimer() {
            if (interval) return;
            const start = Date.now() - elapsed;
            interval = setInterval(() => {
                elapsed = Date.now() - start;
                document.getElementById('display').textContent = formatTime(elapsed);
            }, 10);
        }

        function stopTimer() {
            clearInterval(interval);
            interval = null;
        }

        function resetTimer() {
            stopTimer();
            elapsed = 0;
            document.getElementById('display').textContent = '00:00.00';
            document.getElementById('lap-list').innerHTML = '';
            lapCount = 0;
        }

        function recordLap() {
            if (!interval && elapsed === 0) return;
            lapCount++;
            const div = document.createElement('div');
            div.className = 'flex justify-between px-4 py-2 bg-white/10 rounded-lg text-sm';
            div.innerHTML = `<span>Lap ${lapCount}</span><span class="time-display">${formatTime(elapsed)}</span>`;
            document.getElementById('lap-list').prepend(div);
        }
    </script>
 </body>
