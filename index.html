<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Luck!</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

h1{
    margin-bottom:30px;
    color:black;
}

#luckButton{
    width:220px;
    height:220px;
    border-radius:50%;
    border:none;
    background:#1faa00;
    color:white;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
    transition:transform 0.15s, background 0.2s;
}

#luckButton:active{
    transform:scale(0.95);
    background:#169200;
}

#message{
    margin-top:40px;
    font-size:22px;
    max-width:320px;
    padding:0 15px;
}

</style>
</head>

<body>

<h1>Good Luck!</h1>

<button id="luckButton">Press</button>

<div id="message"></div>

<script>

const sayings = [

"Luck is on your side today!",
"Good fortune is coming your way!",
"You've got this!",
"Today is your lucky day!",
"Success is just around the corner!",
"Something great is about to happen!",
"Believe in your luck!",
"A lucky surprise awaits you!",
"Fortune favors you today!",
"Good vibes and good luck!",
"Opportunity is knocking!",
"The stars are aligned for you!",
"Luck is smiling at you!",
"Great things are coming!",
"Your moment is here!",
"Trust your lucky instincts!",
"Today brings good fortune!",
"You are destined to win!",
"Magic is in the air today!",
"Something amazing will happen!",
"Stay positive and lucky!",
"The odds are in your favor!",
"Your luck is strong today!",
"Expect the unexpected!",
"Good things are on the way!",
"A lucky break is near!",
"Victory is within reach!",
"Your fortune is rising!",
"Today brings new opportunities!",
"Luck follows you everywhere!"

];

const button = document.getElementById("luckButton");
const message = document.getElementById("message");

button.addEventListener("click", function(){

    const random = sayings[Math.floor(Math.random()*sayings.length)];
    message.textContent = random;

});

</script>

</body>
</html>
