<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.phone{
width:100%;
max-width:430px;
aspect-ratio:9/16;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:#000;
color:#fff;
width:100%;
height:100%;
border-radius:25px;
display:flex;
flex-direction:column;
align-items:center;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
font-size:34px;
margin-bottom:15px;
}

#status{
font-size:22px;
margin-bottom:25px;
font-weight:bold;
text-align:center;
min-height:30px;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
width:100%;
max-width:320px;
}

.cell{
background:#111;
border:3px solid #fff;
aspect-ratio:1;
display:flex;
justify-content:center;
align-items:center;
font-size:64px;
font-weight:bold;
cursor:pointer;
border-radius:18px;
transition:.2s;
user-select:none;
}

.cell:hover{
background:#222;
}

.reset{
margin-top:30px;
width:100%;
max-width:320px;
padding:16px;
background:#000;
color:#fff;
border:2px solid #fff;
font-size:22px;
font-weight:bold;
border-radius:14px;
cursor:pointer;
transition:.2s;
}

.reset:hover{
background:#222;
}

.footer{
margin-top:auto;
font-size:18px;
padding-top:20px;
color:#fff;
}
</style>
</head>

<body>

<div class="phone">

<div class="container">

<h1>Tic Tac Toe</h1>

<div id="status">
Player X's Turn
</div>

<div class="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<button class="reset" onclick="resetGame()">
Reset Game
</button>

<div class="footer">
Tapfone © 2026
</div>

</div>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const status=document.getElementById("status");

let board=["","","","","","","","",""];
let currentPlayer="X";
let gameRunning=true;

const wins=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach(cell=>{
cell.addEventListener("click",cellClicked);
});

function cellClicked(){

const index=this.dataset.index;

if(board[index]!=="" || !gameRunning)
return;

board[index]=currentPlayer;
this.textContent=currentPlayer;

checkWinner();

}

function checkWinner(){

let won=false;

for(let combo of wins){

const a=board[combo[0]];
const b=board[combo[1]];
const c=board[combo[2]];

if(a==="" || b==="" || c==="")
continue;

if(a===b && b===c){

won=true;

combo.forEach(i=>{
cells[i].style.background="#333";
});

break;

}

}

if(won){

status.textContent="🎉 Player "+currentPlayer+" Wins!";
gameRunning=false;
return;

}

if(!board.includes("")){

status.textContent="🤝 It's a Draw!";
gameRunning=false;
return;

}

currentPlayer=currentPlayer==="X"?"O":"X";

status.textContent="Player "+currentPlayer+"'s Turn";

}

function resetGame(){

board=["","","","","","","","",""];

currentPlayer="X";

gameRunning=true;

status.textContent="Player X's Turn";

cells.forEach(cell=>{
cell.textContent="";
cell.style.background="#111";
});

}

</script>

</body>
</html>
